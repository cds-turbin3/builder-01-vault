[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
vault = "BGDwZwiCdyRySqdwCnRhAUe1yzZ8jc2Rccde8wYZVQqN"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

# Run tests with:
#   anchor test --skip-local-validator --skip-deploy
# This invokes `cargo build-sbf` (producing target/deploy/vault.so for LiteSVM
# to load via include_bytes!), then executes the `test` script below. The skip
# flags suppress the validator/deploy steps since LiteSVM runs in-process.
[scripts]
test = "cargo test"

[hooks]
